overwrite: true
schema: 'https://raw.githubusercontent.com/AgricolaDevJP/agricoladb-server/main/graph/ent.graphqls'
documents: 'libs/graphql/documents/**/*.graphql'
generates:
  libs/graphql/generated.ts:
    plugins:
      - typescript
      - typescript-operations
      - typescript-graphql-request
avoidOptionals:
  field: true
  inputValue: false
  object: true
  defaultValue: false
